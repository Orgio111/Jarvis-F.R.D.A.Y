name: Go Gateway

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "backend/go-gateway/**"
      - ".github/workflows/go.yml"
  pull_request:
    paths:
      - "backend/go-gateway/**"
      - ".github/workflows/go.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/go-gateway

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go-gateway/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -coverprofile=coverage.txt ./...
