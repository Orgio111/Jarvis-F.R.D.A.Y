version: "3.9"

# ─── JARVIS — GPU Override ─────────────────────────────────────────────────────
# Adds NVIDIA GPU support to python-ai-service.
# Requires: NVIDIA Container Toolkit installed on the host.
# Test GPU: docker run --rm --gpus all nvidia/cuda:12.4.1-base-ubuntu22.04 nvidia-smi
#
# Usage:
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.gpu.yml up -d

services:
  python-ai-service:
    build:
      target: gpu  # Build from GPU stage (nvidia/cuda base)
    environment:
      GPU_ENABLED: "true"
      GPU_REQUIRED: ${GPU_REQUIRED:-false}
      GPU_ALLOW_CPU_FALLBACK: "true"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
