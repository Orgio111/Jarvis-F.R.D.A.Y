global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "go-gateway"
    static_configs:
      - targets: ["go-gateway:8000"]
    metrics_path: /metrics

  - job_name: "python-ai-service"
    static_configs:
      - targets: ["python-ai-service:8100"]
    metrics_path: /metrics

  - job_name: "rust-broker"
    static_configs:
      - targets: ["rust-broker:8200"]
    metrics_path: /metrics

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
    metrics_path: /metrics
