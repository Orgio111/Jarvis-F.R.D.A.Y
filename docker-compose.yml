version: "3.9"

# ─── JARVIS F.R.D.A.Y – local dev stack ──────────────────────────────────────
#
# Prerequisites:
#   docker compose up --build
#
# Optional env overrides (create a .env file in the repo root):
#   ANTHROPIC_API_KEY=sk-ant-...
#   OPENAI_API_KEY=sk-...
#   NVIDIA_NIM_API_KEY=...
#   OPENROUTER_API_KEY=...
#
# GPU (NVIDIA):
#   Uncomment the `deploy:` block under python-ai-service to enable GPU passthrough.
# ─────────────────────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging

  # ── Rust event broker ───────────────────────────────────────────────────────
  rust-broker:
    build:
      context: ./backend/rust-broker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: development
      HOST: "0.0.0.0"
      PORT: "8200"
      REDIS_URL: "redis://redis:6379"
      CHANNEL_CAPACITY: "1024"
      RUST_LOG: "jarvis_broker=info,tower_http=warn"
    ports:
      - "8200:8200"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8200/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Python AI service ────────────────────────────────────────────────────────
  python-ai-service:
    build:
      context: ./backend/python-ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: development
      APP_HOST: "0.0.0.0"
      APP_PORT: "8100"
      REDIS_URL: "redis://redis:6379/0"
      RUST_BROKER_URL: "http://rust-broker:8200"

      # ── Provider keys (leave blank if not using) ────────────────────────────
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      NVIDIA_NIM_API_KEY: "${NVIDIA_NIM_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"

      # ── Provider routing ────────────────────────────────────────────────────
      AI_PROVIDER_PRIMARY: "${AI_PROVIDER_PRIMARY:-anthropic}"
      AI_PROVIDER_FALLBACK: "${AI_PROVIDER_FALLBACK:-openrouter}"
      AI_PROVIDER_ROUTING_MODE: "${AI_PROVIDER_ROUTING_MODE:-auto}"

      # ── GPU (CPU fallback by default) ───────────────────────────────────────
      GPU_ENABLED: "${GPU_ENABLED:-true}"
      GPU_REQUIRED: "false"
      GPU_ALLOW_CPU_FALLBACK: "true"

      # ── Observability ───────────────────────────────────────────────────────
      PROMETHEUS_ENABLED: "true"
      OTEL_ENABLED: "${OTEL_ENABLED:-false}"
      OTEL_SERVICE_NAME: "jarvis-python-ai-service"
      JAEGER_ENDPOINT: "http://jaeger:14268/api/traces"

      # ── Persistent data directory (SQLite DB + FAISS index) ─────────────────
      DATA_DIR: "/app/data"
    volumes:
      - jarvis-data:/app/data
    ports:
      - "8100:8100"
    depends_on:
      redis:
        condition: service_healthy
      rust-broker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8100/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    # ── GPU passthrough (NVIDIA) — uncomment to enable ───────────────────────
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    logging: *default-logging

  # ── Go API gateway ───────────────────────────────────────────────────────────
  go-gateway:
    build:
      context: ./backend/go-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: development
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      PYTHON_AI_SERVICE_URL: "http://python-ai-service:8100"
      RUST_BROKER_URL: "http://rust-broker:8200"
      REDIS_URL: "redis://redis:6379/0"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000,tauri://localhost"
      REQUEST_RATE_LIMIT_PER_MINUTE: "120"
      PROMETHEUS_ENABLED: "true"
      OTEL_ENABLED: "${OTEL_ENABLED:-false}"
      OTEL_SERVICE_NAME: "jarvis-gateway"
      JAEGER_ENDPOINT: "http://jaeger:14268/api/traces"
      GPU_ENABLED: "${GPU_ENABLED:-true}"
      GPU_REQUIRED: "false"
    ports:
      - "8000:8000"
    depends_on:
      python-ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Telegram bot ─────────────────────────────────────────────────────────────
  telegram-bot:
    build:
      context: ./backend/bots
      dockerfile: telegram/Dockerfile
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      JARVIS_URL: "http://go-gateway:8000"
      JARVIS_API_KEY: "${JARVIS_API_KEY:-}"
    depends_on:
      go-gateway:
        condition: service_healthy
    logging: *default-logging

  # ── Discord bot ───────────────────────────────────────────────────────────────
  discord-bot:
    build:
      context: ./backend/bots
      dockerfile: discord/Dockerfile
    restart: unless-stopped
    environment:
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN:-}"
      DISCORD_GUILD_ID: "${DISCORD_GUILD_ID:-}"
      JARVIS_URL: "http://go-gateway:8000"
      JARVIS_API_KEY: "${JARVIS_API_KEY:-}"
    depends_on:
      go-gateway:
        condition: service_healthy
    logging: *default-logging

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    depends_on:
      - go-gateway
      - python-ai-service
    logging: *default-logging

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: jarvis
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/jarvis.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    logging: *default-logging

volumes:
  prometheus-data:
  grafana-data:
  jarvis-data:
