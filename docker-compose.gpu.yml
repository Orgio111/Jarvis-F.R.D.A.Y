# GPU override for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build
#
# Requires NVIDIA Container Toolkit on the host:
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#
# Tested on:
#   - RTX 4050 Laptop (Ada Lovelace, sm_89, CUDA 12.x)
#   - Any NVIDIA GPU with CUDA 12.x driver

services:
  python-ai-service:
    build:
      target: gpu
    environment:
      GPU_ENABLED: "true"
      GPU_REQUIRED: "false"
      GPU_ALLOW_CPU_FALLBACK: "true"
      GPU_PREFER_HALF_PRECISION: "true"
      GPU_ENABLE_MIXED_PRECISION: "true"
      STT_GPU_ENABLED: "true"
      STT_COMPUTE_TYPE: "auto"   # → float16 on CUDA, int8 on CPU
      STT_MODEL_SIZE: "base"
      EMBEDDINGS_GPU_ENABLED: "true"
      VISION_GPU_ENABLED: "true"
      TTS_GPU_ENABLED: "auto"
      FAISS_GPU_ENABLED: "false" # faiss-gpu requires extra setup; cpu is fast enough
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
